name: Check ImmortalWrt Kernel

on:
  schedule:
    # 每天 UTC 1:00 执行 (北京时间 9:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-kernel:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Timezone
        run: sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Restore Kernel State
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/immortalwrt-kernel-state
          key: immortalwrt-kernel-state-${{ github.run_id }}
          restore-keys: |
            immortalwrt-kernel-state-

      - name: Check ImmortalWrt Kernel
        id: check_kernel
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTREAM_BRANCH: openwrt-25.12
          KERNEL_PATCHVER: '6.12'
          KERNEL_STATE_FILE: ${{ runner.temp }}/immortalwrt-kernel-state/state.json
        run: python ${GITHUB_WORKSPACE}/Script/Workflow/kernel_monitor.py

      - name: Save Kernel State
        if: steps.check_kernel.outputs.cache_save == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/immortalwrt-kernel-state
          key: immortalwrt-kernel-state-${{ steps.check_kernel.outputs.state_version }}-${{ steps.check_kernel.outputs.state_commit }}-${{ github.run_id }}

      - name: Delete old Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
