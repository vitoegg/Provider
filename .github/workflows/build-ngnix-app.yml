name: build-nginx-app

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NGINX_VERSION: "1.31.1"
  MODULE_REPO: "https://github.com/pmkol/ngx_stream_trojan_module.git"
  MODULE_REF: "main"

jobs:
  build_amd64:
    name: Build Ngnix amd64
    runs-on: ubuntu-22.04
    env:
      ARTIFACT: nginx-trojan-linux-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ca-certificates curl git file libpcre2-dev libssl-dev zlib1g-dev

      - name: Build nginx
        run: |
          set -euxo pipefail
          curl -fsSLO "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          git clone --depth 1 --branch "${MODULE_REF}" "${MODULE_REPO}" module

          cd "nginx-${NGINX_VERSION}"
          ./configure \
            --prefix=/usr/local/nginx \
            --sbin-path=/usr/local/sbin/nginx \
            --with-stream \
            --with-stream_ssl_module \
            --add-module="${GITHUB_WORKSPACE}/module"

          make -j"$(nproc)"
          strip objs/nginx

          mkdir -p "${GITHUB_WORKSPACE}/dist/${ARTIFACT}"
          cp objs/nginx "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/nginx"
          ./objs/nginx -V 2> "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/nginx-V.txt"
          file objs/nginx > "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/file.txt"

          cd "${GITHUB_WORKSPACE}/dist"
          tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            dist/${{ env.ARTIFACT }}.tar.gz
            dist/${{ env.ARTIFACT }}.tar.gz.sha256

  build_arm64:
    name: Build Ngnix arm64
    runs-on: ubuntu-22.04-arm
    env:
      ARTIFACT: nginx-trojan-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ca-certificates curl git file libpcre2-dev libssl-dev zlib1g-dev

      - name: Build nginx
        run: |
          set -euxo pipefail
          curl -fsSLO "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          git clone --depth 1 --branch "${MODULE_REF}" "${MODULE_REPO}" module

          cd "nginx-${NGINX_VERSION}"
          ./configure \
            --prefix=/usr/local/nginx \
            --sbin-path=/usr/local/sbin/nginx \
            --with-stream \
            --with-stream_ssl_module \
            --add-module="${GITHUB_WORKSPACE}/module"

          make -j"$(nproc)"
          strip objs/nginx

          mkdir -p "${GITHUB_WORKSPACE}/dist/${ARTIFACT}"
          cp objs/nginx "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/nginx"
          ./objs/nginx -V 2> "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/nginx-V.txt"
          file objs/nginx > "${GITHUB_WORKSPACE}/dist/${ARTIFACT}/file.txt"

          cd "${GITHUB_WORKSPACE}/dist"
          tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            dist/${{ env.ARTIFACT }}.tar.gz
            dist/${{ env.ARTIFACT }}.tar.gz.sha256
