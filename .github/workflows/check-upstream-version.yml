name: Check Upstream Version

on:
  schedule:
    # 每天 UTC 1:00 执行 (北京时间 9:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-upstream-version:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Timezone
        run: sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Restore Upstream Version State
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/immortalwrt-kernel-state
          key: upstream-version-state-${{ github.run_id }}
          restore-keys: |
            upstream-version-state-
            upstream-core-state-
            immortalwrt-kernel-state-

      - name: Check Upstream Version
        id: check_version
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KERNEL_UPSTREAM_BRANCH: openwrt-25.12
          KERNEL_PATCHVER: '6.12'
          MIHOMO_REPO: MetaCubeX/mihomo
          MONITOR_STATE_FILE: ${{ runner.temp }}/immortalwrt-kernel-state/state.json
        run: python ${GITHUB_WORKSPACE}/Script/Workflow/version_monitor.py

      - name: Save Upstream Version State
        if: steps.check_version.outputs.cache_save == 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/immortalwrt-kernel-state
          key: upstream-version-state-${{ steps.check_version.outputs.state_key }}-${{ github.run_id }}

      - name: Delete old Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
