# =========================
# 🎨 主题与外观
# =========================

# 主题（使用 `ghostty +list-themes` 查看所有主题）
theme = Ayu

# 背景透明度（1.0=不透明，越小越透明）
background-opacity = 0.85

# 背景模糊（配合透明度使用，类似毛玻璃）
background-blur = 30

# 非活跃分屏透明度（降低干扰，突出当前焦点）
unfocused-split-opacity = 0.9


# =========================
# 🔤 字体设置
# =========================

# 字号
font-size = 14

# 字体加粗增强（让细字体更清晰）
font-thicken = true


# =========================
# 🐚 Shell 集成（高级功能）
# =========================

# 自动注入 shell（这里是 zsh）
shell-integration = zsh

# 启用的功能说明：
# - no-cursor：禁用某些光标行为（避免冲突）
# - sudo：支持 sudo 状态识别
# - title：自动设置窗口标题
# - ssh-terminfo：远程终端兼容
# - ssh-env：传递环境变量
shell-integration-features = no-cursor,sudo,title,ssh-terminfo,ssh-env

# 增强Cli兼容
term = xterm-256color

# =========================
# 🪟 窗口行为
# =========================

# 启动时自动打开窗口
initial-window = true

# 记住窗口状态（位置/大小）
window-save-state = always

# 新分屏 / Tab 继承当前目录
window-inherit-working-directory = true

# 新窗口继承字体大小
window-inherit-font-size = true

# 内边距（避免文字贴边）
window-padding-x = 8
window-padding-y = 8

# 窗口缩小时，内边距等比缩小
window-padding-balance = true


# =========================
# 🧭 macOS 专属（UI风格）
# =========================

# 标题栏显示 Tab（比 hidden 更实用）
macos-titlebar-style = tabs

# 保留窗口阴影（更有层次感）
macos-window-shadow = true


# =========================
# ✨ 光标设置
# =========================

# 光标样式：bar（竖线）
cursor-style = bar

# 光标闪烁
cursor-style-blink = true

# 光标颜色（高可见性）
cursor-color = #ff9e64

# 光标透明度（越小越淡）
cursor-opacity = 0.8


# =========================
# ⌨️ 快捷键
# =========================

# Cmd + D → 向右分屏
keybind = cmd+d=new_split:right

# Cmd + R → 清屏
keybind = cmd+r=clear_screen

# =========================
# 📜 滚动与性能
# =========================

# 滚动缓冲区（历史记录大小，修改为50M）
scrollback-limit = 50000000


# =========================
# 🖱️ 鼠标与剪贴板
# =========================

# 输入时隐藏鼠标（减少干扰）
mouse-hide-while-typing = true

# 选中即复制（无需 Ctrl+C）
copy-on-select = clipboard

# 复制时去掉行尾空格
clipboard-trim-trailing-spaces = true

# 粘贴保护（防止误执行危险命令）
clipboard-paste-protection = true
clipboard-paste-bracketed-safe = true


# =========================
# 🔔 通知与退出行为
# =========================

# 命令执行完成通知
notify-on-command-finish = always

# 关闭最后一个窗口后退出程序
quit-after-last-window-closed = true

# 关闭时不弹确认框
confirm-close-surface = false
